<!doctype html>

<html lang=“en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Gentium+Book+Basic">
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="orange.png">
    <title>Hannah Scott</title>
</head>
<body>
    <h1><a id="two" href="index.html">Hannah<br>Scott</a></h1>
    <p id="one">Projects</p>

    <button type="button" class="collapsible">Lines of Flight (2022)</button>
    <div class="content">
      <img src="IMG_7142.JPG" style="padding-top:20px;width:600px;height:400px;">
      <h2>Lines of Flight is an actively listening room where a stack of sensors, software, machine learning plugins, and cameras take in the subtle movements of bodies and the environmental conditions to form a kind of distributed instrument.</h2>
    </div>

    <script>

        //Collapsible
        var coll = document.getElementsByClassName("collapsible");
        var i;

        for (i = 0; i < coll.length; i++) {
          coll[i].addEventListener("click", function() {
            this.classList.toggle("active");
            var content = this.nextElementSibling;
            if (content.style.display === "block") {
              content.style.display = "none";
            } else {
              content.style.display = "block";
            }
          });
        }

        // Get the modal
        var modal = document.getElementById("myModal");
        
        // Get the button that opens the modal
        var btn = document.getElementById("myBtn");
        
        // Get the <span> element that closes the modal
        var span = document.getElementsByClassName("close")[0];
        
        // When the user clicks the button, open the modal 
        btn.onclick = function() {
          modal.style.display = "block";
        }
        
        // When the user clicks on <span> (x), close the modal
        span.onclick = function() {
          modal.style.display = "none";
        }
        
        // When the user clicks anywhere outside of the modal, close it
        window.onclick = function(event) {
          if (event.target == modal) {
            modal.style.display = "none";
          }
        }
    </script>
    </body>
</html>
